    <script>
      // GitHub Pages SPA: restore path from 404.html redirect
      (function(){
        var r = window.location.search.match(/[?&]p=([^&]*)/) ;
        if (r) {
          var path = '/' + r[1];
          var q = window.location.search.match(/[?&]q=([^&]*)/);
          path += q ? '?' + decodeURIComponent(q[1]) : '';
          path += window.location.hash;
          window.history.replaceState(null, '', path);
        }
      })();
    </script>
